name: Build

on:
  # tag 推送时自动构建发版
  push:
    tags:
      - 'v*'
  # 或手动触发：GitHub → Actions → Build → Run workflow
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号（如 v0.1.0），留空则不创建 Release"
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 musl 工具链（静态链接用）
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: 添加 musl 编译目标
        run: rustup target add x86_64-unknown-linux-musl

      - name: 代码风格检查 (fmt)
        run: cargo fmt --all --check

      - name: 代码风格检查 (clippy)
        run: cargo clippy --all-targets -- -D warnings

      - name: 静态编译
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: 打包二进制
        run: |
          mkdir -p dist
          cp target/x86_64-unknown-linux-musl/release/better-edit-tools dist/
          cd dist && tar czf ../better-edit-tools-x86_64-unknown-linux-musl.tar.gz better-edit-tools

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: better-edit-tools-linux
          path: better-edit-tools-x86_64-unknown-linux-musl.tar.gz

      - name: 解析版本号
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.ref_name }}"
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: 生成 Release Notes
        id: release_notes
        if: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.version != '' }}
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"
          PREV_TAG="$(git tag --sort=-creatordate | grep -xv "$TAG" | head -n 1 || true)"

          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="$TAG"
          fi

          mkdir -p .release
          {
            echo "## better-edit-tools ${TAG}"
            echo
            echo "### Changes"
            echo
            git log --no-merges --format='%s|%h' ${RANGE} | awk '
              BEGIN {
                feat = 0;
                bugfix = 0;
                other = 0;
              }
              function bullet(msg, hash) {
                return "- " msg " (`" hash "`)";
              }
              {
                split($0, parts, "|");
                subject = parts[1];
                hash = parts[2];
                lower = tolower(subject);
                if (lower ~ /^(feat|feature)(\(.+\))?:/) {
                  feat_items[++feat] = bullet(subject, hash);
                } else if (lower ~ /^(fix|bugfix|hotfix|repair)(\(.+\))?:/) {
                  bugfix_items[++bugfix] = bullet(subject, hash);
                } else {
                  other_items[++other] = bullet(subject, hash);
                }
              }
              END {
                print "#### feat";
                if (feat == 0) {
                  print "- (none)";
                } else {
                  for (i = 1; i <= feat; i++) print feat_items[i];
                }

                print;
                print "#### bugfix";
                if (bugfix == 0) {
                  print "- (none)";
                } else {
                  for (i = 1; i <= bugfix; i++) print bugfix_items[i];
                }

                print;
                print "#### other";
                if (other == 0) {
                  print "- (none)";
                } else {
                  for (i = 1; i <= other; i++) print other_items[i];
                }
              }
            '
          } > .release/body.md

          cat .release/body.md

      - name: 创建 Release
        if: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.version != '' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: better-edit-tools-x86_64-unknown-linux-musl.tar.gz
          body_path: .release/body.md
