name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "发布版本号（如 v0.2），留空则不创建 Release"
        required: false
        type: string

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"

      - name: Format check
        run: |
          test -z "$(gofmt -l ./cmd ./internal ./.github/script)"

      - name: Test
        run: GOCACHE=/tmp/go-build GOMODCACHE=/tmp/gomod-cache go test ./...

  build:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            ext: ""
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            ext: ""
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            ext: ""
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            ext: ".exe"
            archive_ext: zip
          - goos: windows
            goarch: arm64
            ext: ".exe"
            archive_ext: zip
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"

      - name: Build helper
        run: go build -o .github/script/betools ./.github/script

      - name: Build binary
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o better-edit-tools${{ matrix.ext }} ./cmd/better-edit-tools

      - name: Package binary
        run: |
          ARCHIVE="better-edit-tools-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive_ext }}"
          if [ "${{ matrix.archive_ext }}" = "zip" ]; then
            ./.github/script/betools package-zip "${ARCHIVE}" "better-edit-tools${{ matrix.ext }}"
          else
            mkdir -p dist
            cp "better-edit-tools${{ matrix.ext }}" dist/
            tar czf "${ARCHIVE}" -C dist "better-edit-tools${{ matrix.ext }}"
          fi
          sha256sum "${ARCHIVE}" > "${ARCHIVE}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: better-edit-tools-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            better-edit-tools-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive_ext }}
            better-edit-tools-${{ matrix.goos }}-${{ matrix.goarch }}.${{ matrix.archive_ext }}.sha256

  release:
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event.inputs.version != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build helper
        run: go build -o .github/script/betools ./.github/script

      - name: Resolve tag
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${{ github.ref_name }}"
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          set -euo pipefail
          TAG="${{ steps.version.outputs.tag }}"
          mkdir -p .release
          ./.github/script/betools release-notes "${TAG}" > .release/body.md

      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: release-artifacts

      - name: Flatten artifacts
        run: |
          find release-artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' \) -exec cp {} . \;

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            better-edit-tools-linux-amd64.tar.gz
            better-edit-tools-linux-amd64.tar.gz.sha256
            better-edit-tools-linux-arm64.tar.gz
            better-edit-tools-linux-arm64.tar.gz.sha256
            better-edit-tools-darwin-amd64.tar.gz
            better-edit-tools-darwin-amd64.tar.gz.sha256
            better-edit-tools-darwin-arm64.tar.gz
            better-edit-tools-darwin-arm64.tar.gz.sha256
            better-edit-tools-windows-amd64.zip
            better-edit-tools-windows-amd64.zip.sha256
            better-edit-tools-windows-arm64.zip
            better-edit-tools-windows-arm64.zip.sha256
          body_path: .release/body.md
